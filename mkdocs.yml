site_name: Building a Recursive Language Model in 77 Lines
docs_dir: docs
theme:
  name: material
  features:
    - navigation.footer
    - navigation.instant
    - navigation.top
    - toc.integrate

plugins:
  - search

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.highlight

nav:
