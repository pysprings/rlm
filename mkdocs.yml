    - "Step 2: Sub-LLM": 03-02-step-2-sub-llm.md
    - "Step 3: Conversation loop": 03-03-step-3-loop.md
    - "Step 4: FINAL signaling": 03-04-step-4-final.md
    - "Step 5: Print capture": 03-05-step-5-print.md
    - "Step 6: Full loop": 03-06-step-6-together.md
  - 4. Implementation: 04-implementation.md
  - 5. Chatbot: 05-chatbot.md
  - 6. Left Out: 06-left-out.md
  - 7. Punchline: 07-punchline.md
